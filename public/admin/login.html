<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Grand Horizon</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-login-page">
    <!-- Login Card -->
    <div class="admin-login-card">
        <div class="admin-login-header">
            <p class="admin-login-title" id="hotel-name">Grand Horizon</p>
            <h1 class="admin-login-heading">Admin</h1>
            <p class="admin-login-subtitle">Sign in to manage your hotel</p>
        </div>
        
        <div class="admin-login-exclusive">
            Authorized Access Only
        </div>
        
        <div id="message" class="admin-login-message"></div>
        
        <form id="login-form" class="admin-login-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>
            
            <button type="submit" class="admin-login-btn">
                Sign In
            </button>
        </form>
        
        <div class="admin-login-back">
            <a href="/">← Back to Website</a>
        </div>
    </div>

    <script>
        // Check if already logged in
        document.addEventListener('DOMContentLoaded', async function() {
            loadSettings();
            try {
                const response = await fetch('/api/admin/check');
                const data = await response.json();
                
                if (data.authenticated) {
                    window.location.href = '/admin/dashboard.html';
                }
            } catch (error) {
                console.error('Error checking auth:', error);
            }
        });

        // Load hotel settings
        async function loadSettings() {
            try {
                const response = await fetch('/api/settings');
                const settings = await response.json();
                if (settings.hotel_name) {
                    document.getElementById('hotel-name').textContent = settings.hotel_name;
                    document.title = settings.hotel_name + ' - Admin Login';
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        // Handle login form submission
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const form = e.target;
            const messageDiv = document.getElementById('message');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            const username = form.username.value;
            const password = form.password.value;
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in...';
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    window.location.href = '/admin/dashboard.html';
                } else {
                    messageDiv.innerHTML = '<div class="error-message">' + result.error + '</div>';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Sign In';
                }
            } catch (error) {
                console.error('Login error:', error);
                messageDiv.innerHTML = '<div class="error-message">An error occurred. Please try again.</div>';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
